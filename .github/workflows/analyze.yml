name: Backfill Spike Library Columns

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install psycopg2-binary

      - name: Run backfill
        env:
          DB_CONNECTION: ${{ secrets.DB_CONNECTION }}
        run: python backfill_spike_library_columns.py
